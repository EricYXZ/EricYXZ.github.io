<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>叶煊喆 | Gallery</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="/">叶煊喆</a>
      <nav class="nav">
        <a href="/">首页</a>
        <a href="/cv/">简历</a>
        <a href="/projects/">项目</a>
        <a href="/research/">科研</a>
        <a href="/blog/">笔记</a>
        <a class="active" href="/gallery/">相册</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">相册</h1>
      <p class="page-intro">Campus, travel, projects, and everyday moments.</p>

      <section class="section">
        <div class="summary">
          用于记录校园生活、项目现场、旅行和其他值得保存的片段。
        </div>
      </section>

      <section class="section">
        <div class="gallery-heading">
          <div>
            <p class="section-kicker">Gallery</p>
            <h2>照片集</h2>
          </div>
          <p class="gallery-caption">精选照片会持续整理到这里。</p>
        </div>

        <div class="photo-grid">
          <figure class="photo-card photo-card--wide">
            <img src="/assets/photos/%5B3.14%5D%5B%E5%8C%97%E4%BA%AC%E7%8E%AF%E7%90%83%E5%BD%B1%E5%9F%8E%5D%5B%E9%9C%8D%E6%A0%BC%E6%B2%83%E8%8C%A8%E5%9F%8E%E5%A0%A1%E7%81%AF%E5%85%89%E7%A7%80%5D.jpg" alt="北京环球影城霍格沃茨城堡灯光秀">
            <figcaption>
              <strong>霍格沃茨城堡灯光秀</strong>
              <span>北京环球影城 · 3.14</span>
            </figcaption>
          </figure>
        </div>
      </section>

      <section class="section">
        <div class="empty-note">
          更多照片会继续整理到 <code>assets/photos/</code> 并展示在这里。
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div>© 2026 叶煊喆</div>
    <div class="visitor-stats" id="busuanzi_container_site_pv" style="display:none;">
      累计访问 <span id="busuanzi_value_site_pv"></span> 次 · 累计访客 <span id="busuanzi_value_site_uv"></span> 人
    </div>
  </footer>
  <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
