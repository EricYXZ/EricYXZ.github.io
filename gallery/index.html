<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <header class="site-header">
    <canvas id="particle-canvas"></canvas>
    <div class="nav-wrap">
      <a class="brand" href="/">叶煊喆</a>
      <button class="hamburger" aria-label="菜单" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav">
        <a href="/">首页</a>
        <a href="/cv/">简历</a>
        <a href="/projects/">项目</a>
        <a href="/research/">科研</a>
        <a href="/blog/">笔记</a>
        <a class="active" href="/gallery/">相册</a>
      </nav>
      <button class="theme-toggle" aria-label="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">相册</h1>
      <p class="page-intro">Campus, travel, projects, and everyday moments.</p>

      <section class="section">
        <div class="gallery-heading">
          <div class="gallery-title-row">
            <p class="section-kicker">Gallery</p>
            <h2>照片集 <span class="photo-count" id="photo-count"></span></h2>
          </div>
          <p class="gallery-caption">点击照片可放大浏览，支持键盘左右切换。</p>
        </div>

        <details class="photo-group animated-details" open>
          <summary class="photo-group-header reveal">
            <span class="photo-group-date">2026</span>
          </summary>

          <div class="photo-grid award-list">
            <figure class="photo-card photo-card--wide reveal reveal-delay-1">
              <div class="photo-overlay">
                <span class="photo-overlay-icon">🔍</span>
              </div>
              <img src="/assets/photos/%5B3.14%5D%5B%E5%8C%97%E4%BA%AC%E7%8E%AF%E7%90%83%E5%BD%B1%E5%9F%8E%5D%5B%E9%9C%8D%E6%A0%BC%E6%B2%83%E8%8C%A8%E5%9F%8E%E5%A0%A1%E7%81%AF%E5%85%89%E7%A7%80%5D.jpg" alt="北京环球影城霍格沃茨城堡灯光秀" loading="lazy">
              <figcaption>
                <strong>北京·环球影城·霍格沃茨城堡灯光秀</strong>
                <span>3.14</span>
              </figcaption>
            </figure>
          </div>
        </details>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div>© 2026 叶煊喆</div>
    <div class="visitor-stats" id="busuanzi_container_site_pv" style="display:none;">
      累计访问 <span id="busuanzi_value_site_pv"></span> 次 · 累计访客 <span id="busuanzi_value_site_uv"></span> 人
    </div>
  </footer>
  <script src="/assets/js/main.js"></script>
  <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

</html>
