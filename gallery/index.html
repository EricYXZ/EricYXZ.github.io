<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>叶煊喆 | Gallery</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="/">叶煊喆</a>
      <nav class="nav">
        <a href="/">首页</a>
        <a href="/cv/">简历</a>
        <a href="/projects/">项目</a>
        <a href="/research/">科研</a>
        <a href="/blog/">笔记</a>
        <a class="active" href="/gallery/">相册</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">相册</h1>
      <p class="page-intro">Campus, travel, projects, and everyday moments.</p>

      <section class="section">
        <div class="summary">
          用于记录校园生活、项目现场、旅行和其他值得保存的片段。照片将陆续整理并上传。
        </div>
      </section>

      <section class="section">
        <div class="gallery-heading">
          <div>
            <p class="section-kicker">Gallery</p>
            <h2>照片集</h2>
          </div>
          <p class="gallery-caption">每张照片可替换为真实图片，并补充地点、日期或简短说明。</p>
        </div>

        <div class="photo-grid">
          <!-- 将下方 photo-placeholder 替换为 <img src="/assets/photos/photo-01.jpg" alt="照片描述"> 即可显示真实照片。 -->
          <figure class="photo-card photo-card--wide">
            <div class="photo-placeholder photo-placeholder--one"><span>照片 01</span></div>
            <figcaption>
              <strong>[相册标题 / 活动名称]</strong>
              <span>[地点] · [日期]</span>
            </figcaption>
          </figure>

          <figure class="photo-card">
            <div class="photo-placeholder photo-placeholder--two"><span>照片 02</span></div>
            <figcaption>
              <strong>[照片标题]</strong>
              <span>[地点] · [日期]</span>
            </figcaption>
          </figure>

          <figure class="photo-card">
            <div class="photo-placeholder photo-placeholder--three"><span>照片 03</span></div>
            <figcaption>
              <strong>[照片标题]</strong>
              <span>[地点] · [日期]</span>
            </figcaption>
          </figure>

          <figure class="photo-card">
            <div class="photo-placeholder photo-placeholder--four"><span>照片 04</span></div>
            <figcaption>
              <strong>[照片标题]</strong>
              <span>[地点] · [日期]</span>
            </figcaption>
          </figure>

          <figure class="photo-card">
            <div class="photo-placeholder photo-placeholder--five"><span>照片 05</span></div>
            <figcaption>
              <strong>[照片标题]</strong>
              <span>[地点] · [日期]</span>
            </figcaption>
          </figure>

          <figure class="photo-card photo-card--tall">
            <div class="photo-placeholder photo-placeholder--six"><span>照片 06</span></div>
            <figcaption>
              <strong>[照片标题]</strong>
              <span>[地点] · [日期]</span>
            </figcaption>
          </figure>
        </div>
      </section>

      <section class="section">
        <div class="empty-note">
          图片文件建议放入 <code>assets/photos/</code>。上传后，将每个占位块替换为对应的 <code>&lt;img&gt;</code> 标签即可；详细示例见 <code>assets/photos/README.md</code>。
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div>© 2026 叶煊喆</div>
    <div class="visitor-stats" id="busuanzi_container_site_pv" style="display:none;">
      累计访问 <span id="busuanzi_value_site_pv"></span> 次 · 累计访客 <span id="busuanzi_value_site_uv"></span> 人
    </div>
  </footer>
  <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
